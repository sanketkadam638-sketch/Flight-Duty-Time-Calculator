name: Build Android APK

# Runs automatically on every push to main, and can also be triggered manually
# from the Actions tab ("Run workflow" button). No local Node.js or Android
# Studio installation is required — everything happens on GitHub's servers.
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install project dependencies
        run: npm install

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cabin-crew-fdtl-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

# ---------------------------------------------------------------------------
# NOTE on publishing to the Play Store:
# The debug APK above is fine for installing on your own phone to test, but
# the Play Store requires a *signed release* build (.aab). To produce that
# from this same workflow instead of a local machine, you would:
#   1. Generate a signing keystore once (this one step does need a keystore
#      tool, but can be done from any online "keytool" tutorial or a single
#      Android Studio session — it is a one-time thing, not an ongoing
#      requirement).
#   2. Add the keystore (base64-encoded) and its passwords as encrypted
#      GitHub Actions secrets (Settings → Secrets and variables → Actions).
#   3. Add a "Build signed release AAB" step here that decodes the keystore
#      and runs `./gradlew bundleRelease` with the signing config supplied
#      via environment variables.
# Ask for this step to be added once you're ready to publish for real —
# it's a five-minute addition once the keystore exists.
# ---------------------------------------------------------------------------
